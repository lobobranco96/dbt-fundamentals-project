models:
  - name: stg_shaffle_shop__customers
    description: Customer data with basic cleaning and transformation applied, one row per customer.
    columns:
      - name: customer_id
        description: The unique key for each customer.
        data_tests:
          - not_null
          - unique

  - name: stg_shaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
        - not_null
        - unique
      - name: customer_id
        data_tests:
          - relationships:
              to: ref('stg_shaffle_shop__customers')
              field: customer_id